<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تجربة تسجيل الدخول</title>
    <style>
        body { font-family: Arial; padding: 50px; text-align: center; }
        input { margin: 10px; padding: 10px; width: 200px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>تسجيل الدخول للنظام</h2>
    <input type="text" id="username" placeholder="اسم المستخدم (admin)"><br>
    <input type="password" id="password" placeholder="كلمة المرور (admin123)"><br>
    <button onclick="login()">دخول</button>

    <h3 id="result" style="margin-top: 20px;"></h3>

    <script>
        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const resultText = document.getElementById('result');

            resultText.innerText = "جاري التحقق...";
            resultText.style.color = "blue";

            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (data.success) {
                    resultText.innerText = "نجاح: " + data.message + " | أهلاً " + data.userData.name;
                    resultText.style.color = "green";
                } else {
                    resultText.innerText = "خطأ: " + data.message;
                    resultText.style.color = "red";
                }
            } catch (err) {
                resultText.innerText = "مشكلة في الاتصال بالسيرفر!";
                resultText.style.color = "red";
            }
        }
    </script>
</body>
</html>
